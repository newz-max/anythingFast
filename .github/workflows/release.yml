name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag. Use v__VERSION__ to read the version from tauri.conf.json.'
        required: true
        default: 'v__VERSION__'
      draft:
        description: 'Create as draft release'
        required: true
        type: boolean
        default: false
      prerelease:
        description: 'Mark as prerelease'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-windows:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Run frontend tests
        run: yarn test

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tauriScript: yarn tauri
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: "事项入口管理器 ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          generateReleaseNotes: true
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || contains(github.ref_name, '-') }}
          args: ''
