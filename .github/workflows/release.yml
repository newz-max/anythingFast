name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag. Use v__VERSION__ to read the version from tauri.conf.json.'
        required: true
        default: 'v__VERSION__'
      draft:
        description: 'Create as draft release'
        required: true
        type: boolean
        default: false
      prerelease:
        description: 'Mark as prerelease'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-windows:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Run frontend tests
        run: yarn test

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Generate release notes
        id: release-notes
        shell: pwsh
        env:
          RAW_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          $ErrorActionPreference = 'Stop'

          $rawTag = $env:RAW_TAG
          if ([string]::IsNullOrWhiteSpace($rawTag)) {
            throw 'Release tag is empty.'
          }

          $version = (Get-Content -Raw -Path 'src-tauri/tauri.conf.json' | ConvertFrom-Json).version
          $releaseTag = $rawTag.Replace('__VERSION__', $version)
          $targetRef = 'HEAD'

          if (git rev-parse --verify --quiet "refs/tags/$releaseTag") {
            $targetRef = $releaseTag
          }

          $targetCommit = (git rev-list -n 1 $targetRef).Trim()
          $previousTag = ''
          try {
            $previousTag = (git describe --tags --match 'v*' --abbrev=0 "$targetCommit^" 2>$null).Trim()
          } catch {
            $previousTag = ''
          }

          $range = if ($previousTag) { "$previousTag..$targetCommit" } else { $targetCommit }
          $commitLines = git log --pretty=format:'%h %s' $range |
            Where-Object { $_ -and ($_ -notmatch '^[0-9a-f]+\s+v?\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$') } |
            ForEach-Object { "- $_" }

          if (-not $commitLines) {
            $commitLines = @('- 本次发布仅包含版本号更新。')
          }

          $body = @(
            '## Commits'
            ''
            $commitLines
          ) -join "`n"

          "tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "body<<EOF" >> $env:GITHUB_OUTPUT
          $body >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tauriScript: yarn tauri
          tagName: ${{ steps.release-notes.outputs.tag }}
          releaseName: "事项入口管理器 ${{ steps.release-notes.outputs.tag }}"
          releaseBody: ${{ steps.release-notes.outputs.body }}
          generateReleaseNotes: false
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || contains(github.ref_name, '-') }}
          args: ''
